logging:
  level:
    io.micrometer.tracing: DEBUG
    io.opentelemetry.exporter.otlp: DEBUG
#--------------------------------------------------------
# Server
#--------------------------------------------------------  
server:
    port: 8080 
    servlet: 
        session: 
            persistent: false
    http2:
        enabled: true
    compression:
        enabled: true
        mime-types: application/json

spring:
    main:
        web-application-type: reactive
    codec:
        max-in-memory-size: -1 # Remove buffer limits
    cloud:
        gateway:
            httpclient:
                connect-timeout: 600000    
                response-timeout: 600s  # 180s for long polls                
            server:
                webflux: 
                    globalcors:
                        add-to-simple-url-handler-mapping: true 
                        cors-configurations:
                            '[/**]':
                                allowedOrigins: "http://localhost:5173" #local
                                #allowedOrigins: "https://xxxxxxxx"  #production
                                allowedHeaders: "Authorization,Content-Type,Accept"
                                allowedMethods:
                                  - GET
                                  - POST
                                  - DELETE
                                  - PUT
                                  - OPTIONS                                  
                                  - PATCH

# Custom security configuration properties
gateway:
  security:
    # Shared secret key used for verifying JWT tokens. Must match the gateway's secret.
    # Value: "this-secret-is-large-enough-to-be-safe-and-256-bit-secure!" base64 encoded
    shared-secret: "dGhpcy1zZWNyZXQtaXMtbGFyZ2UtZW5vdWdoLXRvLWJlLXNhZmUtYW5kLTI1Ni1iaXQtc2VjdXJlIQ=="
