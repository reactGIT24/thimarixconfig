#--------------------------------------------------------
#  Tracing  across Thimarix microservices  - Zipkin
#--------------------------------------------------------
management:
   tracing:
      sampling:
         probability: 1.0
   zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
   otlp:
      tracing:
         endpoint: http://localhost:9411/api/v2/spans   

#--------------------------------------------------------
# Eureka Client
#--------------------------------------------------------  
eureka:
    client:
        fetch-registry: true
        register-with-eureka: true
        serviceUrl:
            defaultZone: ${eureka_url:http://localhost:8761/eureka}           
    instance: 
        hostname: localhost
#--------------------------------------------------------
# CORS Configuration
#--------------------------------------------------------
cors:
    origins: http://localhost:5173   #local
    #origins: https://xxxxxxx     #production
    methods: POST,PUT,GET,OPTIONS,DELETE,PATCH
    headers: Authorization,Content-Type,Accept



    # Or disable security completely
security:
  basic:
    enabled: false
