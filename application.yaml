#--------------------------------------------------------
#  disable security completely
#--------------------------------------------------------
security:
  basic:
    enabled: false

#--------------------------------------------------------
#  Tracing  across Thimarix microservices  - Zipkin
#--------------------------------------------------------
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
    metrics:
      export:
        enabled: false

logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'
#--------------------------------------------------------
# Eureka Client
#--------------------------------------------------------  
eureka:
    client:
        fetch-registry: true
        register-with-eureka: true
        serviceUrl:
            defaultZone: ${eureka_url:http://localhost:8761/eureka}           
    instance: 
        hostname: localhost
#--------------------------------------------------------
# CORS Configuration
#--------------------------------------------------------
cors:
    origins: http://localhost:5173   #local
    #origins: https://xxxxxxx     #production
    methods: POST,PUT,GET,OPTIONS,DELETE,PATCH
    headers: Authorization,Content-Type,Accept

#--------------------------------------------------------
# Custom properties
#--------------------------------------------------------
app:
    loadbalance:
        authentication: lb://AUTHENTICATION-SERVICE
#--------------------------------------------------------
# Custom properties
#--------------------------------------------------------
app:    
    servicename: #-------Sevice name ---------
        authentication: authentication-service
        buyer: http://Buyer-Service
        supplier: http://Supplier-Service
        operation: http://Operation-Service
        inventory: http://Inventory-Service
        redis: http://Redis-Service
        email: http://Email-Service
    
    jwt: #------------ JWT Settings -----------
        token: Token
        jwtsecret: A+APMho:wjx:wJhN0ywLMVIiYc5orY<oF{K0ru+}.Bb
        duration: 24h
        bearer: Bearer 
        authorization: Authorization

    language: #----- Supported Languages --------
        en: en
        ar: ar
        def: en
        accept-lang: Accept-Language

    currency: #--------- Default currency#-----------------
        ar: درهم
        en: AED

    serviceuri: #--------- Services URI --------------------
        authentication: authentication-service
        buyer: http://Buyer-Service
        supplier: http://Supplier-Service
        operation: http://Operation-Service
        inventory: http://Inventory-Service
        redis: http://Redis-Service
        email: http://Email-Service

    loadbalance: # --------- Load Balancing -----------------
        authentication: lb://AUTHENTICATION-SERVICE
        buyer: lb://BUYER-SERVICE
        supplier: lb://Supplier-SERVICE
        operation: lb://OPERATION-SERVICE
        inventory: lb://INVENTORY-SERVICE
        redis: lb://REDIS-SERVICE
        email: lb://EMAIL-SERVICE
    
    logs: # ---- writting logs ---------------
        apigateway: true
        authentication: true
        
    webclient: # ----- Web Client Config  --------------------
        max-connections: 10000
        pending-acquiremaxcount: 1000
        max-idletime: 30
        max-lifetime: 100
        connect-timeout: 600000
        response-timeout: 180000
        retry-backoffmaxattempts: 3
        min-backoff: 100
        read-timeouthandler: 30
        write-timeouthandler: 30

   confirmationtoken: #-----Confirmation Token----- 
        verify-email: Verify Email
        reset-password: Reset Password    
#--------------------------------------------------------
# Gateway custom security configuration properties
#--------------------------------------------------------
gateway:
    security:
        token-subject: api-gateway 
        
        # Whitelisted IPs allowed to access the API Gateway (comma-separated)
        # Includes localhost, IPv6 loopback, and Docker bridge network CIDR (172.16.0.0/12)
        whitelist-ips: 
          - 127.0.0.1
          #- 192.168.1.10
        
        # Shared secret key used for signing JWT tokens.
        # Must be at least 256 bits (32 bytes) long.
        # Value: "this-secret-is-large-enough-to-be-safe-and-256-bit-secure!" base64 encoded
        shared-secret: "dGhpcy1zZWNyZXQtaXMtbGFyZ2UtZW5vdWdoLXRvLWJlLXNhZmUtYW5kLTI1Ni1iaXQtc2VjdXJlIQ=="
        
        # Token expiration in milliseconds (e.g. 5000ms = 5s to prevent replay attacks)
        token-expiration-ms: 5000
        allowed-paths:
            - /actuator/health
            - /actuator/info
