logging:
  level:
    io.micrometer.tracing: DEBUG
    io.opentelemetry.exporter.otlp: DEBUG
#--------------------------------------------------------
# Server
#--------------------------------------------------------  
server:
    port: 8081
    servlet: 
        session: 
            persistent: false
    encoding:
        charset: UTF-8
        force: true
    http2:
        enabled: true	
# for production   logging.level.root=INFO
#--------------------------------------------------------
# Database 
#--------------------------------------------------------
spring: 
    datasource: 
        url: jdbc:mysql://localhost:3306/thimarix_authentication?useSSL=false&createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: root
        password: ungermysql
        hikari:
            maximum-pool-size: 30
            minimum-idle: 10
            pool-name: HikariCP
        driverClassName: com.mysql.cj.jdbc.Driver
    jpa:
        database: MYSQL
        generate-ddl: true
        show-sql: false
        open-in-view: true 
        hibernate: 
            ddl-auto: update
            #ddl-auto: validate production
            naming: 
                physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl 
        properties: 
            hibernate: 
                #dialect: org.hibernate.dialect.MySQL8Dialect
                format_sql: true
                use_sql_comments: true
                enable_lazy_load_no_trans: false
    sql:
        init: 
            platform: mysql
#--------------------------------------------------------
# Cookies
#--------------------------------------------------------
#one day = 86400 seconds
cookie:
    httponly: false
    path: /
    expires: 1
    max-age: 86400
    domain: localhost
    secure: false
    samesite: Lax
    weburl: https://localhost:8060  #api gateway
